[uwsgi]
app = wsgi
module = %(app)

http = 127.0.0.1:6011
http-websockets = true

vacuum = true

master = true
listen = 1024
processes = 64
workers = 8
reload-mercy = 10
limit-as = 2048
buffer-sizi = 30000
lazy-apps = true

pidfile = /alidata1/admin/logs/duang/uwsgi6011.pid
daemonize = /alidata1/admin/logs/duang/uwsgi6011.log

req-logger = file:/alidata1/admin/logs/duang/access.log
logger = file:/alidata1/admin/logs/duang/main.log

enable-threads = true

gevent = 1000
gevent-monkey-patch = true